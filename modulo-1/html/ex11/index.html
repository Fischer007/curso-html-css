<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em Html5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes
        ou simplesmente aumente e diminua o tamanho do seu navegador.
    </p>

    <picture>
        <source media="(max-width: 750px)" srcset="img/pequeno.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="img/medio.png" type="image/png">
        <img src="img/grande.png" alt="foto-grande.png">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <!--<audio src="midia/merry-go.mp3" controls></audio> -->
    <!-- MP3 WAV OGG -->
     <p>Outra maneira de por o audio</p>
     <audio preload="metadata" controls>
        <source src="midia/merry-go.mp3" type="audio/mpeg">
        <source src="midia/merry-go.ogg" type="audio/ogg">
        <source src="midia/merry-go.wav" type="audio/wav">
        <p>Infelizmente seu navegador não pode reproduzir áudio. <a href="midia/merry-go.mp3" download>
            clique aqui para baixar o arquivo MP3
        </a></p>
     </audio>
</body>
</html>
