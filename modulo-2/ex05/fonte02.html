<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @font-face {
            font-family: love;
            src: url('fonts/Lovely.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            /*
                Tipo de format()
                - opentype (otf)
                - truetype (ttf)
                - embedded-opentype
                - truetype-aat (Apple Advanced Typography)
                - svg
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'love','Times New Roman', Times, serif ;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Hello, World!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dicta voluptatum ex omnis eaque, soluta corporis distinctio nesciunt officiis ratione maxime consequatur nemo eligendi, adipisci ullam veniam doloremque? Expedita, nam aliquid.</p>
</body>
</html>
